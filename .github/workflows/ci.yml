---
name: CI
'on':
  pull_request:
  push:
    branches:
      - master
  schedule:
    - cron: "0 7 * * 0"

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies.
        run: pip install yamllint ansible ansible-lint
      - name: Run yamllint.
        run: yamllint .
      - name: Run ansible-lint.
        run: ansible-lint

  molecule:
    name: Molecule (${{ matrix.distro }})
    needs: lint
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        distro:
          - rockylinux9
          - debian11
          - debian12
          - ubuntu2204
          - ubuntu2404
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies.
        run: >-
          pip install requests ansible ansible-compat
          molecule molecule-plugins[docker] pytest-testinfra
      - name: Run molecule.
        run: molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_DISTRO: ${{ matrix.distro }}

  publish:
    name: Galaxy
    if: startsWith(github.ref, 'refs/tags')
    needs: molecule
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Publish to Galaxy.
        uses: ansible-actions/ansible-galaxy-action@v1.2.0
        with:
          galaxy_api_key: ${{ secrets.GALAXY_API_KEY }}
          galaxy_version: ${{ github.ref_name }}
